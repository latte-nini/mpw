<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danni's Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            background: #1a1a1a;
            font-family: 'EB Garamond', Georgia, serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .top-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 24px;
            padding: 28px 40px 20px;
            position: relative;
            z-index: 10;
        }
        .nav-item {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 26px;
            color: #e8e8e8;
            cursor: pointer;
            transition: all 0.35s ease;
            text-decoration: none;
            user-select: none;
        }
        .nav-item:hover, .nav-item.active { 
            font-style: italic; 
            color: #fff; 
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            z-index: 5;
        }
        .image-wrapper {
            position: relative;
            width: 420px;
            height: 280px;
            z-index: 2;
        }
        .image-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #2a2a2a;
            border-radius: 2px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(0.15) contrast(1.05);
        }

        .hero-title {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Permanent Marker', cursive;
            /* 使用 clamp 让字体在 120px 到 400px 之间自适应 */
            font-size: clamp(120px, 25vw, 400px); 
            white-space: nowrap;
            pointer-events: none;
            z-index: 5;
            color: #EFFF00;
            mix-blend-mode: screen;
            opacity: 0.85;
        }

        .footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            z-index: 10;
        }
        .footer span { color: #999; font-size: 14px; }

        @media (max-width: 768px) {
            .image-wrapper { width: 80vw; height: 50vw; }
            .nav-item { font-size: 20px; }
        }
    </style>
</head>
<body>
    <canvas id="bgCanvas"></canvas>
    
    <nav class="top-nav">
        <a class="nav-item" href="Video链接.html">Video</a>
        <a class="nav-item active" href="others.html">Others</a>
        <span class="nav-item" style="opacity:0.4; cursor:default;">coming soon...</span>
    </nav>

    <main class="main-content">
        <div class="image-wrapper">
            <div class="image-container">
                <img id="mainImage" src="IMG_9335.jpg" alt="Portfolio Image">
            </div>
        </div>
        <h1 class="hero-title">DANNI</h1>
    </main>

    <footer class="footer">
        <span>© 2026 Danni's Portfolio</span>
    </footer>

    <script>
const canvas = document.getElementById('bgCanvas');
const ctx = canvas.getContext('2d');
let width, height, rows, cols;
const grid = [];
const mouse = { x: -1000, y: -1000, active: false };

// 動畫參數
const spacing = 35;
const stiffness = 0.1;
const damping = 0.92;
const mouseRadius = 120;
const mouseStrength = 0.5;

function init() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    cols = Math.ceil(width / spacing) + 1;
    rows = Math.ceil(height / spacing) + 1;

    grid.length = 0;
    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            grid.push({
                x: x * spacing,
                y: y * spacing,
                px: x * spacing,
                py: y * spacing,
                ox: x * spacing,
                oy: y * spacing
            });
        }
    }
}

function update() {
    grid.forEach(p => {
        // 彈力恢復到原始位置
        const dx1 = p.ox - p.x;
        const dy1 = p.oy - p.y;
        p.px -= dx1 * stiffness;
        p.py -= dy1 * stiffness;

        // 滑鼠互動
        if (mouse.active) {
            const dx2 = mouse.x - p.x;
            const dy2 = mouse.y - p.y;
            const dist = Math.sqrt(dx2 * dx2 + dy2 * dy2);
            if (dist < mouseRadius) {
                const force = (mouseRadius - dist) / mouseRadius * mouseStrength;
                p.px += dx2 * force;
                p.py += dy2 * force;
            }
        }

        // 物理運動計算
        const vx = (p.x - p.px) * damping;
        const vy = (p.y - p.py) * damping;
        p.px = p.x;
        p.py = p.y;
        p.x += vx;
        p.y += vy;
    });
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.beginPath();
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)'; // 背景網格線條顏色
    ctx.lineWidth = 1;

    for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
            const i = y * cols + x;
            const p = grid[i];

            // 橫線
            if (x < cols - 1) {
                const pRight = grid[i + 1];
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(pRight.x, pRight.y);
            }
            // 直線
            if (y < rows - 1) {
                const pBottom = grid[i + cols];
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(pBottom.x, pBottom.y);
            }
        }
    }
    ctx.stroke();
    requestAnimationFrame(() => {
        update();
        draw();
    });
}

// 監聽事件
window.addEventListener('mousemove', e => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.active = true;
});
window.addEventListener('mouseleave', () => mouse.active = false);
window.addEventListener('resize', init);

// 啟動
init();
draw();
    </script>
</body>
</html>
