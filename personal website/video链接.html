<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DANNI — Video</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght:200;300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f0eeeb;
            --text: #1a1a1a;
            --text-muted: rgba(26,26,26,0.5);
            --text-light: rgba(26,26,26,0.25);
            --accent: #c23a2b;
            --line: #c23a2b;
        }

        html, body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            cursor: default;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== CANVAS BACKGROUND ===== */
        #doodleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            background: #f0eeeb;
        }

        /* ===== LOADING ===== */
        .loader {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            transition: opacity 1s cubic-bezier(0.23, 1, 0.32, 1), 
                        visibility 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .loader.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader-text {
            font-size: 11px;
            letter-spacing: 10px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 300;
            animation: breathe 2s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* ===== MAIN CANVAS ===== */
        .main-canvas {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1400px;
            pointer-events: none;
        }

        .card-stack {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .project-card {
            position: absolute;
            width: 140px;
            cursor: pointer;
            transition: all 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform;
            user-select: none;
            text-decoration: none;
            display: block;
            pointer-events: auto;
        }

        .project-card:hover {
            z-index: 100 !important;
        }

        .project-card:hover .card-inner {
            box-shadow: 0 20px 50px rgba(194,58,43,0.15), 
                        0 8px 20px rgba(0,0,0,0.08);
        }

        .project-card:hover .card-image {
            transform: scale(1.04);
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 140px;
            border-radius: 3px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.06), 
                        0 4px 10px rgba(0,0,0,0.04);
            background: #fff;
            transition: box-shadow 0.7s cubic-bezier(0.23, 1, 0.32, 1);
            border: 1px solid rgba(194,58,43,0.08);
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
            display: block;
            filter: contrast(1.05) saturate(0.85);
        }

        .card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(
                180deg,
                transparent 50%,
                rgba(194,58,43,0.08) 100%
            );
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .project-card:hover .card-overlay {
            opacity: 1;
        }

        .card-num {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 9px;
            color: var(--line);
            letter-spacing: 2px;
            font-weight: 300;
            z-index: 5;
            transition: opacity 0.4s ease;
            opacity: 0.5;
        }

        .project-card:hover .card-num {
            opacity: 0;
        }

        .card-data {
            margin-top: 10px;
            text-align: center;
            opacity: 0;
            transform: translateY(6px);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .project-card:hover .card-data {
            opacity: 1;
            transform: translateY(0);
        }

        .card-data .data-num {
            font-size: 16px;
            font-weight: 500;
            color: var(--line);
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .card-data .data-label {
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-top: 3px;
            font-weight: 400;
        }

        /* ===== RIGHT FILTER: Only "All" ===== */
        .right-filter {
            position: fixed;
            right: 28px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            pointer-events: auto;
        }

        .filter-btn {
            background: transparent;
            border: none;
            padding: 6px 0;
            font-size: 10px;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            white-space: nowrap;
            font-family: 'Inter', sans-serif;
            position: relative;
        }

        .filter-btn::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--line);
            transition: width 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .filter-btn:hover {
            color: var(--text-muted);
        }

        .filter-btn.active {
            color: var(--text);
        }

        .filter-btn.active::after {
            width: 100%;
        }

        .filter-btn .count {
            font-size: 9px;
            opacity: 0.35;
            margin-left: 5px;
            font-weight: 300;
        }

        /* ===== BOTTOM LEFT ===== */
        .bottom-left {
            position: fixed;
            bottom: 24px;
            left: 28px;
            z-index: 100;
            pointer-events: none;
        }

        .bottom-left .name {
            font-size: 11px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text-muted);
            font-weight: 300;
        }

        .bottom-left .year {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--text-light);
            font-weight: 300;
            margin-top: 2px;
        }

        ::-webkit-scrollbar { display: none; }
        body { -ms-overflow-style: none; scrollbar-width: none; }
    </style>

<body>
    <canvas id="doodleCanvas"></canvas>

    <div class="loader" id="loader">
        <div class="loader-text">DANNI</div>
    </div>

    <div class="main-canvas" id="mainCanvas">
        <div class="card-stack" id="cardStack"></div>
    </div>

    <div class="right-filter">
        <button class="filter-btn active" data-filter="all">All <span class="count">05</span></button>
    </div>

    <div class="bottom-left">
        <div class="name">DANNI</div>
        <div class="year">2026</div>
    </div>

    <script>
        // ===== BLUE MARKER DOODLE GRID =====
        const canvas = document.getElementById('doodleCanvas');
        const ctx = canvas.getContext('2d');

        let doodleW, doodleH;
        let time = 0;

        function resizeCanvas() {
            doodleW = canvas.width = window.innerWidth;
            doodleH = canvas.height = window.innerHeight;
        }

        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let seed = 12345;
        function seededRandom() {
            seed = (seed * 16807 + 0) % 2147483647;
            return (seed - 1) / 2147483646;
        }

        const doodles = [];
        for (let i = 0; i < 60; i++) {
            doodles.push({
                x: seededRandom(),
                y: seededRandom(),
                type: Math.floor(seededRandom() * 5),
                size: 5 + seededRandom() * 15,
                phase: seededRandom() * Math.PI * 2
            });
        }

        function drawWobblyLine(x1, y1, x2, y2, color, width, wobble) {
            ctx.strokeStyle = color;
            ctx.lineWidth = width;
            ctx.lineCap = 'round';

            const dist = Math.sqrt((x2-x1)**2 + (y2-y1)**2);
            const steps = Math.max(2, Math.floor(dist / 6));

            ctx.beginPath();
            ctx.moveTo(x1, y1);

            for (let i = 1; i <= steps; i++) {
                const t = i / steps;
                const bx = x1 + (x2 - x1) * t;
                const by = y1 + (y2 - y1) * t;

                const perpX = -(y2 - y1) / (dist || 1);
                const perpY = (x2 - x1) / (dist || 1);

                const w = wobble * (
                    Math.sin(t * 7 + time * 0.015) * 0.5 +
                    Math.sin(t * 11 - time * 0.01) * 0.3
                );

                const jitter = (time % 5 === 0) ? (Math.random() - 0.5) * 3 : 0;

                ctx.lineTo(bx + perpX * w + jitter, by + perpY * w + jitter);
            }

            ctx.stroke();
        }

        function drawDoodle() {
            ctx.fillStyle = '#f0eeeb';
            ctx.fillRect(0, 0, doodleW, doodleH);

            const gridSize = 70;
            const cols = Math.ceil(doodleW / gridSize) + 2;
            const rows = Math.ceil(doodleH / gridSize) + 2;

            const driftX = (time * 0.15) % gridSize;
            const driftY = (time * 0.1) % gridSize;

            // BLUE color, BOLDER lines
            const BLUE = '#4a7ba7';
            const LINE_WIDTH = 1.8;
            const GRID_ALPHA = 0.18;

            // Vertical grid lines
            for (let c = -1; c < cols; c++) {
                const x = c * gridSize - driftX;
                ctx.globalAlpha = GRID_ALPHA;
                drawWobblyLine(x, -10, x, doodleH + 10, BLUE, LINE_WIDTH, 2.5);
            }

            // Horizontal grid lines
            for (let r = -1; r < rows; r++) {
                const y = r * gridSize - driftY;
                ctx.globalAlpha = GRID_ALPHA;
                drawWobblyLine(-10, y, doodleW + 10, y, BLUE, LINE_WIDTH, 2.5);
            }

            ctx.globalAlpha = 1;

            // Doodle marks at intersections
            for (let i = 0; i < doodles.length; i++) {
                const d = doodles[i];
                const gx = Math.floor(d.x * cols) * gridSize - driftX;
                const gy = Math.floor(d.y * rows) * gridSize - driftY;

                if ((time + i * 7) % 30 < 3) continue;

                const alpha = 0.2 + Math.sin(time * 0.008 + d.phase) * 0.1;
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = BLUE;
                ctx.lineWidth = 1.5;
                ctx.lineCap = 'round';

                const s = d.size;

                if (d.type === 0) {
                    drawWobblyLine(gx - s, gy, gx + s, gy, BLUE, 1.5, 1);
                    drawWobblyLine(gx, gy - s, gx, gy + s, BLUE, 1.5, 1);
                } else if (d.type === 1) {
                    ctx.beginPath();
                    for (let a = 0; a <= 12; a++) {
                        const angle = (a / 12) * Math.PI * 2;
                        const r = s * (0.7 + Math.sin(angle * 3 + time * 0.02) * 0.3);
                        const px = gx + Math.cos(angle) * r + (Math.random() - 0.5) * 2;
                        const py = gy + Math.sin(angle) * r + (Math.random() - 0.5) * 2;
                        if (a === 0) ctx.moveTo(px, py);
                        else ctx.lineTo(px, py);
                    }
                    ctx.stroke();
                } else if (d.type === 2) {
                    drawWobblyLine(gx - s, gy - s, gx + s, gy - s, BLUE, 1.3, 1);
                    drawWobblyLine(gx + s, gy - s, gx + s, gy + s, BLUE, 1.3, 1);
                    drawWobblyLine(gx + s, gy + s, gx - s, gy + s, BLUE, 1.3, 1);
                    drawWobblyLine(gx - s, gy + s, gx - s, gy - s, BLUE, 1.3, 1);
                } else if (d.type === 3) {
                    ctx.beginPath();
                    ctx.moveTo(gx - s, gy - s * 0.5);
                    for (let z = 0; z < 4; z++) {
                        ctx.lineTo(gx - s + (z + 0.5) * (2 * s / 4), gy + (z % 2 === 0 ? s * 0.5 : -s * 0.5));
                    }
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(gx, gy, s, 0, Math.PI * 1.5);
                    ctx.stroke();
                }
            }

            ctx.globalAlpha = 1;

            // Floating strokes
            for (let i = 0; i < 25; i++) {
                const sx = (doodles[i % doodles.length].x * doodleW + time * 0.2) % doodleW;
                const sy = (doodles[(i + 10) % doodles.length].y * doodleH + time * 0.15) % doodleH;
                const len = 8 + (i % 5) * 4;
                const angle = (i * 0.7 + time * 0.003);

                const ex = sx + Math.cos(angle) * len;
                const ey = sy + Math.sin(angle) * len;

                ctx.globalAlpha = 0.12;
                drawWobblyLine(sx, sy, ex, ey, BLUE, 1.0, 1);
            }

            ctx.globalAlpha = 1;

            time++;
            requestAnimationFrame(drawDoodle);
        }

            }
        ];

        const cardStack = document.getElementById('cardStack');

        const CARD_SIZE = 140;
        const SPACING = Math.round(CARD_SIZE * 0.35);

        const cardLayouts = [
            { x: -SPACING * 4, y: 40,  z: 0,    rot: -4,  scale: 1.0  },
            { x: -SPACING * 3, y: 20,  z: -60,  rot: -2,  scale: 0.96 },
            { x: -SPACING * 2, y: 0,   z: -120, rot: 0,   scale: 0.92 },
            { x: -SPACING * 1, y: -20, z: -180, rot: 2,   scale: 0.88 },
            { x: 0,            y: -40, z: -240, rot: 4,   scale: 0.84 }
        ];

        function createCards() {
            cardStack.innerHTML = '';

            projects.forEach((project, index) => {
                const card = document.createElement('a');
                card.className = 'project-card';
                card.href = project.link;
                card.target = '_blank';
                card.rel = 'noopener noreferrer';
                card.dataset.index = index;

                const num = String(index + 1).padStart(2, '0');
                const layout = cardLayouts[index];

                card.innerHTML = `
                    <div class="card-inner">
                        <img class="card-image" src="${project.image}" alt="${project.title}" loading="eager">
                        <div class="card-overlay"></div>
                        <span class="card-num">${num}</span>
                    </div>
                    <div class="card-data">
                        <div class="data-num">${project.dataNum}</div>
                        <div class="data-label">${project.dataLabel}</div>
                    </div>
                `;

                card.style.transform = `
                    translate3d(${layout.x}px, ${layout.y}px, ${layout.z}px)
                    rotateY(${layout.rot}deg)
                    scale(${layout.scale})
                `;
                card.style.zIndex = String(100 - index * 15);

                card.addEventListener('mouseenter', () => onCardHover(index));
                card.addEventListener('mouseleave', () => onCardLeave());

                cardStack.appendChild(card);
            });
        }

        function onCardHover(hoverIndex) {
            const cards = cardStack.querySelectorAll('.project-card');
            cards.forEach((card, i) => {
                const layout = cardLayouts[i];

                if (i === hoverIndex) {
                    card.style.transform = `
                        translate3d(${layout.x}px, ${layout.y - 15}px, ${layout.z + 80}px)
                        rotateY(${layout.rot}deg)
                        scale(${layout.scale * 1.08})
                    `;
                    card.style.zIndex = '300';
                    card.style.filter = 'brightness(1.05)';
                } else {
                    const dist = Math.abs(i - hoverIndex);
                    card.style.transform = `
                        translate3d(${layout.x}px, ${layout.y + 10 * dist}px, ${layout.z - 40 * dist}px)
                        rotateY(${layout.rot}deg)
                        scale(${layout.scale * 0.96})
                    `;
                    card.style.filter = 'brightness(0.6) saturate(0.3)';
                    card.style.zIndex = String(100 - i * 15 - dist * 10);
                }
            });
        }

        function onCardLeave() {
            const cards = cardStack.querySelectorAll('.project-card');
            cards.forEach((card, i) => {
                const layout = cardLayouts[i];
                card.style.transform = `
                    translate3d(${layout.x}px, ${layout.y}px, ${layout.z}px)
                    rotateY(${layout.rot}deg)
                    scale(${layout.scale})
                `;
                card.style.zIndex = String(100 - i * 15);
                card.style.filter = 'none';
            });
        }

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        window.addEventListener('load', () => {
            drawDoodle();
            createCards();
            setTimeout(() => {
                document.getElementById('loader').classList.add('hidden');
            }, 1000);
        });
    </script>
